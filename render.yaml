        value: jdbc:postgresql://ep-crimson-unit-an2ijgru.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        value: npg_4RAn9UbcKlzd
      - key: ML_SERVICE_URL
        fromService:
          name: gigasure-ml-intelligence
          type: web
          property: host
        suffix: /predictFraud
